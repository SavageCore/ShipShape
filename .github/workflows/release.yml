name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Assemble mod package
        run: |
          mkdir -p ShipShape/Scripts
          cp src/main.lua ShipShape/Scripts/main.lua
          touch ShipShape/enabled.txt
          zip -r "ShipShape-${{ steps.version.outputs.version }}.zip" ShipShape/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: "ShipShape-${{ steps.version.outputs.version }}.zip"
          generate_release_notes: true
