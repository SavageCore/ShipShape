name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Package mod
        run: |
          mkdir -p ShipShape/Scripts
          touch ShipShape/enabled.txt
          cp src/main.lua ShipShape/Scripts/main.lua
          zip -r "ShipShape-${GITHUB_REF_NAME}.zip" ShipShape
      - uses: softprops/action-gh-release@v3
        with:
          files: ShipShape-*.zip
          generate_release_notes: true
